<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | page</title>
    <link rel="stylesheet" href="./style.css">
    <!-- tailwind and daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
            <!-- fonts wosem -->
             <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
  <body>
    <!-- main part stard -->
<section id="home-section" class="">

    <header class="mb-15"> 
<div class="flex flex-col md:flex-row items-center bg-base-100 shadow-sm py-5 px-10">
  <div class="flex-1 flex items-center gap-4 ">
    <img class=" w-20" src="./assets/github-logo.png" alt="">
    <h2 class="text-3xl font-semibold">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input id="search" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

    <button onclick="searchData()" class="btn btn-primary">Search</button>
    
  </div>
</div>

    </header>  

  <main class="w-10/12 mx-auto">
 <!-- buttons -->
    <div id="button-container" class="bg-white p-6 rounded-md mb-10">
    <button onclick=" filterData('all'),showTab('all')" id="btn-all" class=" btn active">All</button>
    <button onclick="filterData('open'), showTab('open')" id="btn-open" class=" btn">open</button>
    <button  onclick="filterData('closed'),  showTab('closed')" id="btn-closed" class=" btn">closed</button>
    
    
    </div>
 <!-- count section -->
    <div class="flex flex-col md:flex-row justify-between items-center bg-white p-8">
        <div class="flex items-center gap-4">
            <img class="w-10" src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="text-2xl font-semibold"><span id="count">50</span> Issues</h2>
                <p>Track and manage your project issues</p>

            </div>
          
        </div>
          <div class="flex gap-5">
                <p class="font-medium"><span class="text-[#00A96E]"><i class="fa-solid fa-circle text-[10px]"></i> </span>open</p>
                <p class="font-medium"><span class="text-[#A855F7]"><i class="fa-solid fa-circle text-[10px]"></i> </span> close</p>
            </div>
    </div>

   <!-- all card container -->
    <div>
      <div id="card-container" class="grid grid-cols-1 md:grid-cols-4 p-4 gap-4">

        

    </div>
    <div id="loding-spinner" class="h-[60vh] flex hidden justify-center items-center">
            <span class="loading loading-dots loading-xl text-center"></span>
        </div>
    </div>


        <!-- modal -->

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="ditals-container" class="">

     


    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn active">Close</button>
      </form>
    </div>
  </div>
</dialog>

  </main>

 
</section>



 <script src="./script/script.js"></script>
        
  </body>
</html>
