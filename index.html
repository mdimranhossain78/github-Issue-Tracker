
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loging||page</title>
    <link rel="stylesheet" href="./style.css">
    <!-- tailwind and daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
            <!-- fonts wosem -->
             <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
  <body>
    <!-- main part stard -->
<section id="home-section" class="hidden">

    <header class="mb-15"> 
        <div class="navbar bg-base-100 shadow-sm px-10">
  <div class="flex-1 flex items-center gap-4 ">
    <img class=" w-20" src="./assets/github-logo.png" alt="">
    <h2 class="text-3xl font-semibold">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

    <button class="btn btn-primary">Primary</button>
    
  </div>
</div>

    </header>

  <main class="w-10/12 mx-auto">
 <!-- buttons -->
    <div id="button-container" class="bg-white p-6 rounded-md mb-10">
    <button id="btn-all " class=" btn btn-outline active">All</button>
    <button id="btn-all " class=" btn btn-outline">open</button>
    <button id="btn-all " class=" btn btn-outline">closed</button>
    
    
    </div>
 <!-- count section -->
    <div class="bg-white p-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img class="w-10" src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="text-2xl font-semibold"><span>50</span> Issues</h2>
                <p>Track and manage your project issues</p>

            </div>
          
        </div>
          <div class="flex gap-5">
                <p class="font-medium"><span class="text-emerald-400"><i class="fa-solid fa-circle text-[10px]"></i> </span>open</p>
                <p class="font-medium"><span><i class="fa-solid fa-circle text-[10px]"></i> </span> close</p>
            </div>
    </div>

   <!-- all card container -->
    <div>
      <div id="card-container" class="grid grid-cols-1 md:grid-cols-4 p-4 gap-4">

        

    </div>
    <div id="loding-spinner" class="h-[60vh] flex hidden justify-center items-center">
            <span class="loading loading-dots loading-xl text-center"></span>
        </div>
    </div>


  </main>

 
</section>








    <!-- login part -->
    <section id="login-section" class="pt-24">
        <div class="bg-white w-[520px] p-4 mx-auto">
        <div class="flex flex-col items-center gap-4">
        <div> <img class="" src="./assets/github-logo.png" alt=""> </div>
        <div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-400">Sign in to manage your issues</p>
        </div>
        </div> 

            <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
            <div class="card-body">
                <fieldset class="fieldset space-y-1">
                <label class="label text-neutral font-bold">User Name</label>

                <input id="user-name" type="text" class="input bg-base-200  rounded-full" placeholder="user name" maxlength="11" minlength="11" />

                <p>Default: admin</p>

                <label class="label text-neutral font-bold">password</label>

                <input id="loging-password" type="password" class="input bg-base-200  rounded-full" placeholder="Enter pass" maxlength="" />

                <p>Default: admin123</p>

                <button id="login-btn" class="btn btn-primary mt-4 rounded-full text-base-100 text-[20px]
                ">Sign In</button>
                
                </fieldset>
            </div>
            </div>
        </div>

        </div>

        </section>

        <script src="./script/script.js"></script>
        <script src="./script/login.js"></script>
  </body>
</html>
